name: Build and Push Docker Images to ECR

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to fetch full history for diff

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, create ECR repo if needed, and push Docker images
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          # Determine the base commit for the changed-files diff.
          # github.event.before is the null SHA on a new branch's first push
          # (and empty for pull_request events), which makes `git diff` abort
          # with "fatal: bad object". Fall back to the merge-base with the
          # default branch, then to the commit's first parent, so detection
          # works for new branches, PRs, and normal pushes alike.
          BEFORE="${{ github.event.before }}"
          echo "Reported previous SHA: ${BEFORE:-<none>}"
          echo "Current SHA: ${{ github.sha }}"

          if [ -z "$BEFORE" ] \
             || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
             || ! git rev-parse --verify --quiet "${BEFORE}^{commit}" >/dev/null; then
            git fetch --no-tags origin main >/dev/null 2>&1 || true
            BASE=$(git merge-base origin/main "${{ github.sha }}" 2>/dev/null || true)
            if [ -z "$BASE" ]; then
              BASE=$(git rev-parse --verify --quiet "${{ github.sha }}^" || true)
            fi
          else
            BASE="$BEFORE"
          fi

          # Get changed files between the resolved base and the current commit.
          if [ -n "$BASE" ]; then
            echo "Diffing against base: $BASE"
            changed_files=$(git diff --name-only "$BASE" "${{ github.sha }}")
          else
            # Root commit with no parent: treat every tracked file as changed.
            echo "No diff base found; treating all tracked files as changed."
            changed_files=$(git ls-tree -r --name-only "${{ github.sha }}")
          fi

          echo "Changed files:"
          echo "$changed_files"

          for dir in */ ; do
            dir=${dir%/}
            # Check if any changed files in this directory
            if echo "$changed_files" | grep -q "^$dir/"; then
              echo "Detected changes in $dir - processing..."

              IMAGE_NAME="$dir"
              ECR_REPO="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME"

              # Check if ECR repo exists, create if not
              if ! aws ecr describe-repositories --repository-names "$IMAGE_NAME" > /dev/null 2>&1; then
                echo "ECR repository $IMAGE_NAME does not exist. Creating..."
                aws ecr create-repository --repository-name "$IMAGE_NAME" > /dev/null || true
              else
                echo "ECR repository $IMAGE_NAME already exists."
              fi

              # Build and push image
              TAG="${GITHUB_SHA::7}"
              docker build -f "$dir/Dockerfile" -t "$ECR_REPO:$TAG" .
              docker push "$ECR_REPO:$TAG"
              docker tag "$ECR_REPO:$TAG" "$ECR_REPO:latest"
              docker push "$ECR_REPO:latest"
            else
              echo "No changes in $dir, skipping build."
            fi
          done
